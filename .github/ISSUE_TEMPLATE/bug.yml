name: 🐛 Bug Report
description: File a bug report to help us improve
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **⚠️ Important:**  
        Please report each bug in a separate issue. Do not combine multiple issues in one report.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Nomad Cafe are you using?
      placeholder: e.g., v1.0.0, commit hash, etc.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did you encounter this bug?
      multiple: true
      options:
        - Local Development (npm run dev)
        - Production Build (npm run build)
        - Docker
        - GitHub Pages
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Step-by-step guide to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Console Output
      description: Paste any error messages, build logs, or console output
      render: shell
      placeholder: |
        Error: Failed to compile
        ./app/page.tsx:10:5
        Type 'string' is not assignable to type 'number'.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (if applicable)
      description: Drag and drop images here to help explain the issue
      placeholder: |
        ![screenshot](url)
