name: ✨ Feature Request
description: Suggest an idea for Nomad Cafe
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **⚠️ Important:**  
        Please create a separate request for each feature. Do not combine multiple features in one request.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is
      placeholder: e.g., I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've thought about
      placeholder: e.g., A different approach would be to [...]

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or references here

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How important is this feature to you?
      options:
        - Critical (blocking my usage)
        - High (would greatly improve workflow)
        - Medium (nice to have)
        - Low (cosmetic or minor)
    validations:
      required: true
