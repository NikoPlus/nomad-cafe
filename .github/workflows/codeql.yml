name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '23 6 * * 1'   # Every Monday at 6:23 UTC

permissions:
  security-events: write    # Only needed for uploading results
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none   # No build for JS/TS analysis

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for the selected language.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Custom query suite: includes security-extended and a custom ruleset
        queries: |
          +security-extended
          +security-and-quality
          +./.github/codeql/custom-queries.qls   # Optional: you can add a custom query file
        config: |
          paths-ignore:
            - '**/node_modules'
            - '**/public'
            - '**/styles'
            - '**/.next'
            - '**/out'
          paths:
            - 'app'
            - 'components'
            - 'lib'
            - 'utils'
            - 'hooks'
            - 'pages'    # if any legacy pages exist
          queries:
            - uses: security-extended
            - uses: security-and-quality

    # Build step is skipped for JavaScript/TypeScript (build-mode: none)
    # If your project has a build script that transforms code, you can set build-mode: manual
    # and run `npm run build` here.

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        # Upload even if the analysis encountered errors
        upload: always
        # Fail the workflow if any alert of severity 'error' is found
        check-fail-mode: failures-only