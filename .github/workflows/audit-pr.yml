name: Audit PR (unprivileged)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read          # Only read code
  actions: write          # To upload artifacts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json || true
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT

      - name: Next.js build test
        id: next_build
        continue-on-error: true
        run: |
          NEXT_EXPORT=true pnpm run build > build-output.txt 2>&1 || true
          if grep -qi "error\|failed" build-output.txt; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts (results)
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            audit-results.json
            build-output.txt
          if-no-files-found: ignore
