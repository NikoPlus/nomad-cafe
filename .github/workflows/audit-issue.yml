name: Audit & Auto-Issue

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      ## FIXED: Better capture of npm audit results
      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          set -e
          npm audit --json | tee audit-results.json
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json)" >> $GITHUB_OUTPUT
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run TypeScript check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1
          if [ $? -ne 0 ]; then echo "has_error=true" >> $GITHUB_OUTPUT; else echo "has_error=false" >> $GITHUB_OUTPUT; fi

      - name: Get username
        id: get_user
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            USERNAME="${{ github.event.pusher.name }}"
          else
            USERNAME="${{ github.repository_owner }}"
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

      ## FIXED: Properly formatted markdown and YAML
      - name: Prepare issue body
        id: prep_body
        if: always()
        run: |
          VULN_COUNT=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo "0")
          TSC_ERRORS=$(cat tsc-output.txt 2>/dev/null | wc -l)

          if [ "$VULN_COUNT" -gt 0 ] || [ "$TSC_ERRORS" -gt 0 ]; then
            ISSUE_TITLE="🚨 Audit Report: Issues Found"
            cat > issue_body.md << 'EOF'
            # 🚨 Automated Audit Report

            EOF
            echo "**Mention:** @${{ steps.get_user.outputs.username }}" >> issue_body.md
            echo "" >> issue_body.md
            echo "## Issues found" >> issue_body.md
            echo "" >> issue_body.md
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "### 📦 npm Audit" >> issue_body.md
              echo "" >> issue_body.md
              echo "Found **$VULN_COUNT** vulnerability(ies)." >> issue_body.md
              echo "" >> issue_body.md
              echo '```json' >> issue_body.md
              jq '.vulnerabilities' audit-results.json >> issue_body.md
              echo '```' >> issue_body.md
              echo "" >> issue_body.md
            fi
            if [ "$TSC_ERRORS" -gt 0 ]; then
              echo "### 🔷 TypeScript Errors" >> issue_body.md
              echo "" >> issue_body.md
              echo '```' >> issue_body.md
              cat tsc-output.txt >> issue_body.md
              echo '```' >> issue_body.md
              echo "" >> issue_body.md
            fi
          else
            ISSUE_TITLE="✅ Audit Report: All Checks Passed"
            cat > issue_body.md << 'EOF'
            # ✅ Automated Audit Report

            EOF
            echo "**Mention:** @${{ steps.get_user.outputs.username }}" >> issue_body.md
            echo "" >> issue_body.md
            echo "**Status:** All audits passed successfully." >> issue_body.md
            echo "" >> issue_body.md
            echo "- **npm audit:** No vulnerabilities" >> issue_body.md
            echo "- **TypeScript check:** No type errors" >> issue_body.md
            echo "" >> issue_body.md
          fi
          echo "_Generated on $(date -u +"%Y-%m-%dT%H:%M:%SZ")_" >> issue_body.md

          echo "ISSUE_TITLE=$ISSUE_TITLE" >> $GITHUB_ENV
          if [ "$VULN_COUNT" -gt 0 ] || [ "$TSC_ERRORS" -gt 0 ]; then
            echo "HAS_PROBLEMS=true" >> $GITHUB_ENV
          else
            echo "HAS_PROBLEMS=false" >> $GITHUB_ENV
          fi

      ## FIXED: Properly formatted YAML for the creation step
      - name: Create issue with PAT
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -f issue_body.md ]; then
            BODY=$(cat issue_body.md)
          else
            BODY="Audit completed."
          fi

          if gh issue list --label "automated-audit" --state open | grep -q "Automated Audit"; then
            ISSUE_NUMBER=$(gh issue list --label "automated-audit" --state open --json number --jq '.[0].number')
            gh issue edit $ISSUE_NUMBER \
              --title "$ISSUE_TITLE" \
              --body "$BODY" \
              --add-label "automated-audit,$([ "$HAS_PROBLEMS" = "true" ] && echo "bug" || echo "")"
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$BODY" \
              --label "automated-audit,$([ "$HAS_PROBLEMS" = "true" ] && echo "bug" || echo "")" \
              --assignee "${{ steps.get_user.outputs.username }}"
          fi