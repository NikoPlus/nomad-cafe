name: Audit & Auto-Issue

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  issues: write
  contents: read          # To read commit info

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # To get the latest commit info

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json)" >> $GITHUB_OUTPUT

      - name: Run TypeScript check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1
          if [ $? -ne 0 ]; then echo "has_error=true" >> $GITHUB_OUTPUT; else echo "has_error=false" >> $GITHUB_OUTPUT; fi

      - name: Determine assignee (last commit author)
        id: get_assignee
        run: |
          # Get the email and username of the latest commit author
          COMMIT_AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
          # Try to get GitHub username from email (if available)
          # Simple fallback: use the commit author's name (may not be a GitHub username)
          COMMIT_AUTHOR_NAME=$(git log -1 --pretty=format:'%an')
          # For GitHub API, we need the login. If we can't guess, leave empty.
          # You can use a GitHub API call to resolve email -> login, but that adds complexity.
          # For now, we'll use the repo owner as a fallback, or leave empty.
          echo "author_email=$COMMIT_AUTHOR_EMAIL" >> $GITHUB_OUTPUT
          echo "author_name=$COMMIT_AUTHOR_NAME" >> $GITHUB_OUTPUT
          # Determine if we can assign (only if we have a known login)
          # We'll try to assign to the repo owner as a safe default (but we saw it fails?)
          # Alternatively, don't assign at all. The user can manually set assignee later.
          echo "assignee=" >> $GITHUB_OUTPUT   # Empty for now

      - name: Prepare issue body (always runs)
        id: prep_body
        if: always()
        run: |
          VULN_COUNT=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo "0")
          TSC_ERRORS=$(cat tsc-output.txt 2>/dev/null | wc -l)

          if [ "$VULN_COUNT" -gt 0 ] || [ "$TSC_ERRORS" -gt 0 ]; then
            ISSUE_TITLE="🚨 Audit Report: Issues Found"
            ISSUE_BODY="# 🚨 Automated Audit Report\n\n"
            ISSUE_BODY+="## Issues found\n\n"
            if [ "$VULN_COUNT" -gt 0 ]; then
              ISSUE_BODY+="### 📦 npm Audit\n\nFound **$VULN_COUNT** vulnerability(ies).\n\n"
              ISSUE_BODY+="\`\`\`json\n$(jq '.vulnerabilities' audit-results.json)\n\`\`\`\n\n"
            fi
            if [ "$TSC_ERRORS" -gt 0 ]; then
              ISSUE_BODY+="### 🔷 TypeScript Errors\n\n\`\`\`\n$(cat tsc-output.txt)\n\`\`\`\n\n"
            fi
          else
            ISSUE_TITLE="✅ Audit Report: All Checks Passed"
            ISSUE_BODY="# ✅ Automated Audit Report\n\n"
            ISSUE_BODY+="**Status:** All audits passed successfully.\n\n"
            ISSUE_BODY+="- **npm audit:** No vulnerabilities\n"
            ISSUE_BODY+="- **TypeScript check:** No type errors\n\n"
          fi
          ISSUE_BODY+="_Generated on $(date -u +"%Y-%m-%dT%H:%M:%SZ")_"
          echo "$ISSUE_BODY" > issue_body.md
          echo "ISSUE_TITLE=$ISSUE_TITLE" >> $GITHUB_ENV
          if [ "$VULN_COUNT" -gt 0 ] || [ "$TSC_ERRORS" -gt 0 ]; then
            echo "HAS_PROBLEMS=true" >> $GITHUB_ENV
          else
            echo "HAS_PROBLEMS=false" >> $GITHUB_ENV
          fi

      - name: Create or update audit issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issueBody = fs.readFileSync('issue_body.md', 'utf8');
            const issueTitle = process.env.ISSUE_TITLE;
            const hasProblems = process.env.HAS_PROBLEMS === 'true';

            // Try to assign to the last commit author (if resolvable)
            // For simplicity, we'll not assign automatically due to token restrictions.
            // Instead, we'll mention the author in the issue body.
            const commitAuthor = '${{ steps.get_assignee.outputs.author_name }}';
            if (commitAuthor) {
              issueBody = `@${commitAuthor} \n\n` + issueBody;
            }

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-audit'
            });

            const existingIssue = issues.data.find(issue => 
              issue.title === '✅ Audit Report: All Checks Passed' || 
              issue.title === '🚨 Audit Report: Issues Found'
            );

            const labels = ['automated-audit'];
            if (hasProblems) labels.push('bug');

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title: issueTitle,
                body: issueBody,
                labels: labels
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: labels
                // No assignees – token can't assign
              });
            }