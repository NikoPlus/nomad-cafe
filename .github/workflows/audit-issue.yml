name: Audit & Auto-Issue

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 UTC
  push:
    branches: [ main ]
  workflow_dispatch:       # Allow manual trigger

permissions:
  issues: write            # Needed to create issues

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json)" >> $GITHUB_OUTPUT

      - name: Run TypeScript check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1
          # If tsc fails (exit code != 0), mark that we have an error
          if [ $? -ne 0 ]; then echo "has_error=true" >> $GITHUB_OUTPUT; else echo "has_error=false" >> $GITHUB_OUTPUT; fi

      - name: Create or update audit issue
        if: steps.npm_audit.outputs.has_issues != '0' || steps.tsc_check.outputs.has_error == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🧹 Automated Audit Report\n\n';
            
            // Add npm audit results
            if (fs.existsSync('audit-results.json')) {
              const audit = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
              const vulnCount = audit.vulnerabilities ? Object.keys(audit.vulnerabilities).length : 0;
              if (vulnCount > 0) {
                body += `### 📦 npm Audit\nFound **${vulnCount}** vulnerabilities.\n\`\`\`json\n${JSON.stringify(audit.vulnerabilities, null, 2)}\n\`\`\`\n\n`;
              }
            }
            
            // Add TypeScript errors
            if (fs.existsSync('tsc-output.txt')) {
              const tscErrors = fs.readFileSync('tsc-output.txt', 'utf8');
              if (tscErrors.trim()) {
                body += `### 🔷 TypeScript Errors\n\`\`\`\n${tscErrors.slice(0, 5000)}\n\`\`\`\n\n`;
              }
            }
            
            body += `_Generated on ${new Date().toUTCString()} by the audit workflow._`;
            
            // Try to find an existing open audit issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-audit'
            });
            
            const existing = issues.data.find(issue => issue.title === '🧹 Automated Audit Report');
            
            if (existing) {
              // Update existing issue with new body
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🧹 Automated Audit Report',
                body: body,
                labels: ['automated-audit', 'bug']
              });
            }