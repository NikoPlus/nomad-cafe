name: Audit & Auto-Issue

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json)" >> $GITHUB_OUTPUT

      - name: Run TypeScript check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1
          if [ $? -ne 0 ]; then echo "has_error=true" >> $GITHUB_OUTPUT; else echo "has_error=false" >> $GITHUB_OUTPUT; fi

      - name: Prepare issue body (always runs)
        id: prep_body
        if: always()   # Force step to run even if checks had no issues
        run: |
          # Default: no problems found
          ISSUE_TITLE="✅ Audit Report: All Checks Passed"
          ISSUE_BODY="## 🧹 Automated Audit Report\n\n"
          ISSUE_BODY+="**Status:** All audits passed successfully ✅\n\n"
          ISSUE_BODY+="- **npm audit:** No vulnerabilities found\n"
          ISSUE_BODY+="- **TypeScript check:** No type errors\n\n"
          ISSUE_BODY+="_Generated on $(date -u +"%Y-%m-%dT%H:%M:%SZ") by the audit workflow._"

          # Check if there are any problems
          HAS_PROBLEMS=false
          VULN_COUNT=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo "0")
          TSC_ERRORS=$(cat tsc-output.txt 2>/dev/null | wc -l)

          if [ "$VULN_COUNT" -gt 0 ] || [ "$TSC_ERRORS" -gt 0 ]; then
            HAS_PROBLEMS=true
            ISSUE_TITLE="🚨 Audit Report: Issues Found"

            # Fetch the bug.yml template
            TEMPLATE_URL="https://raw.githubusercontent.com/NikoPlus/nomad-cafe/main/.github/ISSUE_TEMPLATE/bug.yml"
            curl -s $TEMPLATE_URL > bug_template.yml 2>/dev/null

            # Extract the body part of the template as base
            if [ -f bug_template.yml ]; then
              ISSUE_BODY=$(sed -n '/^body:/,$ p' bug_template.yml)
            else
              ISSUE_BODY="## 🐛 Bug Report\n\n"
            fi

            # Append audit details
            ISSUE_BODY+="\n\n## 🧹 Automated Audit Report\n\n"

            if [ "$VULN_COUNT" -gt 0 ]; then
              ISSUE_BODY+="### 📦 npm Audit\nFound **$VULN_COUNT** vulnerabilities.\n\n"
              ISSUE_BODY+="\`\`\`json\n$(jq '.vulnerabilities' audit-results.json)\n\`\`\`\n\n"
            fi

            if [ "$TSC_ERRORS" -gt 0 ]; then
              ISSUE_BODY+="### 🔷 TypeScript Errors\n\n\`\`\`\n$(cat tsc-output.txt)\n\`\`\`\n\n"
            fi

            ISSUE_BODY+="_Generated on $(date -u +"%Y-%m-%dT%H:%M:%SZ") by the audit workflow._"
          fi

          # Write the final issue body to a file
          echo "$ISSUE_BODY" > issue_body.md
          echo "ISSUE_TITLE=$ISSUE_TITLE" >> $GITHUB_ENV
          echo "HAS_PROBLEMS=$HAS_PROBLEMS" >> $GITHUB_ENV

      - name: Create or update audit issue (always runs)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issueBody = fs.readFileSync('issue_body.md', 'utf8');
            const issueTitle = process.env.ISSUE_TITLE;
            const hasProblems = process.env.HAS_PROBLEMS === 'true';

            // Search for existing audit issue (by label)
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-audit'
            });

            const existingIssue = issues.data.find(issue => 
              issue.title === '✅ Audit Report: All Checks Passed' || 
              issue.title === '🚨 Audit Report: Issues Found'
            );

            if (existingIssue) {
              // Update existing issue with new body (and possibly new title)
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title: issueTitle,
                body: issueBody
              });
            } else {
              // Create new issue
              const labels = ['automated-audit'];
              if (hasProblems) labels.push('bug');
              else labels.push('maintenance');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: labels,
                assignees: [context.repo.owner]
              });
            }