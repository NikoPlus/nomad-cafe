name: Audit & Auto-Issue

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json)" >> $GITHUB_OUTPUT

      - name: Run TypeScript check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1
          if [ $? -ne 0 ]; then echo "has_error=true" >> $GITHUB_OUTPUT; else echo "has_error=false" >> $GITHUB_OUTPUT; fi

      - name: Prepare issue body from bug template
        id: prep_body
        if: steps.npm_audit.outputs.has_issues != '0' || steps.tsc_check.outputs.has_error == 'true'
        run: |
          # Fetch the bug.yml template
          TEMPLATE_URL="https://raw.githubusercontent.com/NikoPlus/nomad-cafe/main/.github/ISSUE_TEMPLATE/bug.yml"
          curl -s $TEMPLATE_URL > bug_template.yml

          # Extract the YAML front matter and body fields
          sed -n '/^body:/,$ p' bug_template.yml > issue_body.md

          # Append audit results to the issue body
          echo -e "\n## 🧹 Automated Audit Report\n\n" >> issue_body.md

          # Add npm audit results
          if [ -f audit-results.json ]; then
            vuln_count=$(jq '.vulnerabilities | length' audit-results.json)
            if [ "$vuln_count" -gt 0 ]; then
              echo -e "### 📦 npm Audit\nFound **$vuln_count** vulnerabilities.\n\n\`\`\`json\n$(jq '.vulnerabilities' audit-results.json)\n\`\`\`\n\n" >> issue_body.md
            fi
          fi

          # Add TypeScript errors
          if [ -f tsc-output.txt ] && [ -s tsc-output.txt ]; then
            echo -e "### 🔷 TypeScript Errors\n\n\`\`\`\n$(cat tsc-output.txt)\n\`\`\`\n\n" >> issue_body.md
          fi

          echo -e "_Generated on $(date -u +"%Y-%m-%dT%H:%M:%SZ") by the audit workflow._" >> issue_body.md

          echo "NOMAD_CAFE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create or update audit issue
        # 🔧 FIXED: Only run if the previous step succeeded (file exists)
        if: steps.prep_body.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issueBody = fs.readFileSync('issue_body.md', 'utf8');

            // Fetch existing audit issue (search by label and title)
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-audit'
            });

            const existingIssue = issues.data.find(issue => issue.title === '🧹 Automated Audit Report');

            if (existingIssue) {
              // Update existing issue with new body
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: issueBody
              });
            } else {
              // Create new issue using the bug template effectively
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🧹 Automated Audit Report',
                body: issueBody,
                labels: ['automated-audit', 'bug'],
                assignees: [context.repo.owner]
              });
            }