name: Audit & Auto-Issue

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json || true
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT

      - name: Run TypeScript check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1 || true
          if grep -q "error" tsc-output.txt; then
            echo "has_error=true" >> $GITHUB_OUTPUT
          else
            echo "has_error=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Next.js build (static export test)
        id: next_build
        continue-on-error: true
        run: |
          NEXT_EXPORT=true npm run build > build-output.txt 2>&1 || true
          if grep -qi "error\|failed" build-output.txt; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get username
        id: get_user
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            USERNAME="${{ github.event.pusher.name }}"
          else
            USERNAME="${{ github.repository_owner }}"
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

      - name: Create or update audit issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const hasVulns = parseInt('${{ steps.npm_audit.outputs.has_issues }}') > 0;
            const hasTscErrors = '${{ steps.tsc_check.outputs.has_error }}' === 'true';
            const hasBuildFailure = '${{ steps.next_build.outputs.build_failed }}' === 'true';
            const hasProblems = hasVulns || hasTscErrors || hasBuildFailure;
            
            let issueTitle = hasProblems ? '🚨 Audit Report: Issues Found' : '✅ Audit Report: All Checks Passed';
            let issueBody = hasProblems ? '# 🚨 Automated Audit Report\n\n' : '# ✅ Automated Audit Report\n\n';
            issueBody += `**Mention:** @${{ steps.get_user.outputs.username }}\n\n`;
            
            if (hasProblems) {
              issueBody += '## Issues found\n\n';
              
              if (hasVulns) {
                const auditData = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
                const vulnCount = Object.keys(auditData.vulnerabilities || {}).length;
                issueBody += `### 📦 npm Audit\n\nFound **${vulnCount}** vulnerability(ies).\n\n\`\`\`json\n${JSON.stringify(auditData.vulnerabilities, null, 2)}\n\`\`\`\n\n`;
              }
              
              if (hasTscErrors) {
                const tscErrors = fs.readFileSync('tsc-output.txt', 'utf8');
                issueBody += `### 🔷 TypeScript Errors\n\n\`\`\`\n${tscErrors}\n\`\`\`\n\n`;
              }
              
              if (hasBuildFailure) {
                const buildOutput = fs.readFileSync('build-output.txt', 'utf8');
                issueBody += `### ⚠️ Next.js Build Failure\n\n\`\`\`\n${buildOutput.slice(0, 5000)}\n\`\`\`\n\n`;
                issueBody += '**Note:** This typically indicates a missing `generateStaticParams()` or other export-time error.\n\n';
              }
            } else {
              issueBody += '**Status:** All audits passed successfully.\n\n';
              issueBody += '- **npm audit:** No vulnerabilities\n';
              issueBody += '- **TypeScript check:** No type errors\n';
              issueBody += '- **Next.js build:** Succeeded\n\n';
            }
            
            issueBody += `_Generated on ${new Date().toISOString()}_`;
            
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-audit'
            });
            
            const existingIssue = existingIssues.data.find(issue => 
              issue.title === '✅ Audit Report: All Checks Passed' || 
              issue.title === '🚨 Audit Report: Issues Found'
            );
            
            const labels = ['automated-audit'];
            if (hasProblems) labels.push('bug');
            
            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title: issueTitle,
                body: issueBody,
                labels: labels
              });
            } else {
              // Create new issue – assignee only works with PAT
              // The default GITHUB_TOKEN cannot assign. Use PAT_TOKEN if you have it.
              // If you want assignment, set GH_TOKEN secret and use gh CLI. 
              // Here we use github-script without assignees to avoid permission errors.
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: labels
              });
            }