name: Audit & Create Issue Chain

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json || true
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT

      - name: Run Next.js build (static export test)
        id: next_build
        continue-on-error: true
        run: |
          NEXT_EXPORT=true pnpm run build > build-output.txt 2>&1 || true
          if grep -qi "error\|failed" build-output.txt; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update Parent Issue and Sub‑issues
        uses: actions/github-script@v9
        env:
          HAS_VULNS: ${{ steps.npm_audit.outputs.has_issues }}
          HAS_BUILD_FAIL: ${{ steps.next_build.outputs.build_failed }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              console.log('Not a pull request, skipping');
              return;
            }

            const hasVulns = parseInt(process.env.HAS_VULNS) > 0;
            const hasBuildFail = process.env.HAS_BUILD_FAIL === 'true';
            const hasProblems = hasVulns || hasBuildFail;

            // ----- 1. Find or create Parent Issue for this PR -----
            const parentLabel = `audit-parent-pr-${prNumber}`;
            let parentNumber = null;

            const { data: existingParents } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [parentLabel],
              state: 'open'
            });

            if (existingParents.length > 0) {
              parentNumber = existingParents[0].number;
            } else {
              const { data: newParent } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 Audit results for PR #${prNumber}`,
                body: `This parent issue tracks automated audit findings for PR #${prNumber}.\n\n**Run time:** ${new Date().toISOString()}`,
                labels: ['automated-audit', parentLabel]
              });
              parentNumber = newParent.number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `📋 Audit results are tracked in parent issue #${parentNumber}`
              });
            }

            // ----- 2. Helper to manage a sub‑issue (create if problem exists, close if resolved) -----
            async function manageSubIssue(title, labelSuffix, content, problemExists) {
              const subLabel = `audit-sub-${labelSuffix}`;
              const { data: existingSubs } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [subLabel],
                state: 'open'
              });

              if (problemExists) {
                if (existingSubs.length === 0) {
                  // Create new sub-issue
                  const { data: newSub } = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: `${content}\n\n**Parent issue:** #${parentNumber}\n**Last updated:** ${new Date().toISOString()}`,
                    labels: ['audit-subissue', subLabel]
                  });
                  // Comment on PR linking the sub-issue
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `🔍 Created sub‑issue: #${newSub.number} – ${title}`
                  });
                } else {
                  // Update existing sub-issue body (optional)
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existingSubs[0].number,
                    body: `${content}\n\n**Parent issue:** #${parentNumber}\n**Last updated:** ${new Date().toISOString()}`
                  });
                }
              } else {
                // No problem – close any open sub-issue
                for (const sub of existingSubs) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: sub.number,
                    state: 'closed',
                    state_reason: 'completed'
                  });
                }
              }
            }

            // ----- 3. Create/update the two sub‑issues -----
            // Sub‑issue 1: npm Audit
            let auditContent = '';
            if (hasVulns && fs.existsSync('audit-results.json')) {
              const auditJson = fs.readFileSync('audit-results.json', 'utf8');
              const parsed = JSON.parse(auditJson);
              const vulnCount = Object.keys(parsed.vulnerabilities || {}).length;
              auditContent = `## 📦 npm Audit Report\n\nFound **${vulnCount}** vulnerability(ies).\n\n\`\`\`json\n${JSON.stringify(parsed.vulnerabilities, null, 2)}\n\`\`\``;
            } else {
              auditContent = '## ✅ npm Audit\n\nNo vulnerabilities found.';
            }
            await manageSubIssue('📦 npm Audit', 'npm-audit', auditContent, hasVulns);

            // Sub‑issue 2: Next.js Build Failure
            let buildContent = '';
            if (hasBuildFail && fs.existsSync('build-output.txt')) {
              const buildLog = fs.readFileSync('build-output.txt', 'utf8');
              buildContent = `## ⚠️ Next.js Build Failure\n\n\`\`\`\n${buildLog.slice(0, 5000)}\n\`\`\``;
            } else {
              buildContent = '## ✅ Next.js Build\n\nBuild succeeded.';
            }
            await manageSubIssue('⚠️ Next.js Build Failure', 'build-failure', buildContent, hasBuildFail);

            // ----- 4. Update parent issue summary -----
            const parentBody = `# Audit Summary for PR #${prNumber}\n\n**Last run:** ${new Date().toISOString()}\n\n${
              hasProblems ? '⚠️ **Issues detected** – see sub‑issues below.' : '✅ **All checks passed** – no open sub‑issues.'
            }\n\n### Sub‑issues\n- ${hasVulns ? '📦 npm Audit (open)' : '📦 npm Audit (resolved)'}\n- ${hasBuildFail ? '⚠️ Build Failure (open)' : '⚠️ Build Failure (resolved)'}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: parentBody,
              state: hasProblems ? 'open' : 'closed'
            });
