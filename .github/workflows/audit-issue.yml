name: Audit Security & Create Issue Chain

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- Fetch CodeQL alerts via API ----
      - name: Fetch CodeQL alerts
        id: codeql
        continue-on-error: true
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/code-scanning/alerts?state=open > codeql-alerts.json || echo "[]" > codeql-alerts.json
          count=$(jq 'length' codeql-alerts.json)
          echo "count=$count" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Fetch Dependabot alerts via API ----
      - name: Fetch Dependabot alerts
        id: dependabot
        continue-on-error: true
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/dependabot/alerts?state=open > dependabot-alerts.json || echo "[]" > dependabot-alerts.json
          count=$(jq 'length' dependabot-alerts.json)
          echo "count=$count" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- npm audit ----
      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json || true
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT

      # ---- Next.js build test ----
      - name: Next.js build test
        id: next_build
        continue-on-error: true
        run: |
          NEXT_EXPORT=true pnpm run build > build-output.txt 2>&1 || true
          if grep -qi "error\|failed" build-output.txt; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi

      # ---- Create/Update Parent Issue and Sub-issues ----
      - name: Manage issues via GitHub Script
        uses: actions/github-script@v7
        env:
          HAS_NPM_VULNS: ${{ steps.npm_audit.outputs.has_issues }}
          HAS_BUILD_FAIL: ${{ steps.next_build.outputs.build_failed }}
          HAS_CODEQL: ${{ steps.codeql.outputs.count }}
          HAS_DEPENDABOT: ${{ steps.dependabot.outputs.count }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request?.number;

            // Determine parent label & title
            let parentLabel = 'audit-parent-weekly';
            let titlePrefix = 'Weekly Security & Health Audit';
            if (prNumber) {
              parentLabel = `audit-parent-pr-${prNumber}`;
              titlePrefix = `Audit for PR #${prNumber}`;
            }

            const hasNpmVulns = parseInt(process.env.HAS_NPM_VULNS) > 0;
            const hasBuildFail = process.env.HAS_BUILD_FAIL === 'true';
            const hasCodeQl = parseInt(process.env.HAS_CODEQL) > 0;
            const hasDependabot = parseInt(process.env.HAS_DEPENDABOT) > 0;
            const hasProblems = hasNpmVulns || hasBuildFail || hasCodeQl || hasDependabot;

            // 1. Find or create Parent Issue
            let parentNumber = null;
            const { data: existingParents } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [parentLabel],
              state: 'open'
            });
            if (existingParents.length > 0) {
              parentNumber = existingParents[0].number;
            } else {
              const { data: newParent } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 ${titlePrefix}`,
                body: `This parent issue tracks automated audit results.\n\n**Run type:** ${context.eventName}\n**Time:** ${new Date().toISOString()}${prNumber ? `\n**PR:** #${prNumber}` : ''}`,
                labels: ['automated-audit', parentLabel]
              });
              parentNumber = newParent.number;
              if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `📋 Audit results are tracked in parent issue #${parentNumber}`
                });
              }
            }

            // 2. Helper: create/update sub-issue
            async function manageSubIssue(title, labelSuffix, content, problemExists) {
              const subLabel = `audit-sub-${labelSuffix}`;
              const { data: existingSubs } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [subLabel],
                state: 'open'
              });
              if (problemExists) {
                if (existingSubs.length === 0) {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: `${content}\n\n**Parent issue:** #${parentNumber}\n**Last updated:** ${new Date().toISOString()}`,
                    labels: ['audit-subissue', subLabel]
                  });
                } else {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existingSubs[0].number,
                    body: `${content}\n\n**Parent issue:** #${parentNumber}\n**Last updated:** ${new Date().toISOString()}`
                  });
                }
              } else if (existingSubs.length > 0) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingSubs[0].number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
            }

            // 3. Build sub‑issue contents
            // npm audit
            let npmContent = '';
            if (hasNpmVulns && fs.existsSync('audit-results.json')) {
              const auditJson = fs.readFileSync('audit-results.json', 'utf8');
              const parsed = JSON.parse(auditJson);
              const vulnCount = Object.keys(parsed.vulnerabilities || {}).length;
              npmContent = `## 📦 npm Audit Report\n\nFound **${vulnCount}** vulnerability(ies).\n\n\`\`\`json\n${JSON.stringify(parsed.vulnerabilities, null, 2)}\n\`\`\``;
            } else {
              npmContent = '## ✅ npm Audit\n\nNo vulnerabilities found.';
            }
            await manageSubIssue('📦 npm Audit', 'npm-audit', npmContent, hasNpmVulns);

            // Build failure
            let buildContent = '';
            if (hasBuildFail && fs.existsSync('build-output.txt')) {
              const buildLog = fs.readFileSync('build-output.txt', 'utf8');
              buildContent = `## ⚠️ Next.js Build Failure\n\n\`\`\`\n${buildLog.slice(0, 5000)}\n\`\`\``;
            } else {
              buildContent = '## ✅ Next.js Build\n\nBuild succeeded.';
            }
            await manageSubIssue('⚠️ Next.js Build Failure', 'build-failure', buildContent, hasBuildFail);

            // CodeQL alerts (one sub‑issue per alert)
            if (fs.existsSync('codeql-alerts.json')) {
              const alerts = JSON.parse(fs.readFileSync('codeql-alerts.json', 'utf8'));
              for (const alert of alerts) {
                const title = `🔒 CodeQL: ${alert.rule.name}`;
                const content = `**Severity:** ${alert.rule.security_severity_level}\n**Description:** ${alert.rule.description}\n**File:** \`${alert.most_recent_instance.location.path}\`\n**Line:** ${alert.most_recent_instance.location.start_line}\n\n[View on GitHub](${alert.html_url})`;
                await manageSubIssue(title, `codeql-${alert.number}`, content, true);
              }
            }

            // Dependabot alerts (one sub‑issue per alert)
            if (fs.existsSync('dependabot-alerts.json')) {
              const alerts = JSON.parse(fs.readFileSync('dependabot-alerts.json', 'utf8'));
              for (const alert of alerts) {
                const title = `📦 Dependabot: ${alert.security_advisory?.summary || alert.package?.name}`;
                const content = `**Severity:** ${alert.security_advisory?.severity}\n**Package:** \`${alert.security_advisory?.package?.name || alert.package?.name}\`\n**Vulnerable version range:** ${alert.security_vulnerability?.vulnerable_version_range}\n**Patched version:** ${alert.security_vulnerability?.first_patched_version?.identifier}\n\n[View on GitHub](${alert.html_url})`;
                await manageSubIssue(title, `dependabot-${alert.number}`, content, true);
              }
            }

            // 4. Update parent body
            const parentBody = `# Audit Summary\n\n**Last run:** ${new Date().toISOString()}\n\n${
              hasProblems ? '⚠️ **Issues detected** – see sub‑issues below.' : '✅ **All checks passed** – no open sub‑issues.'
            }\n\n### Sub‑issues\n${hasBuildFail ? '- ⚠️ Build Failure (open)\n' : '- ✅ Build Failure (resolved)\n'}${
              hasNpmVulns ? '- 📦 npm Audit (open)\n' : '- ✅ npm Audit (resolved)\n'}${
              hasCodeQl ? '- 🔒 CodeQL Alerts (open)\n' : '- ✅ CodeQL Alerts (resolved)\n'}${
              hasDependabot ? '- 📦 Dependabot Alerts (open)\n' : '- ✅ Dependabot Alerts (resolved)\n'}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: parentBody,
              state: hasProblems ? 'open' : 'closed'
            });
