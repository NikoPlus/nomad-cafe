name: Audit & Auto-Issue (PR Chain)

on:
  pull_request_target:                    # Runs for PRs (even from forks)
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 9 * * 1'                   # Weekly full audit on main
  workflow_dispatch:                      # Manual trigger

permissions:
  contents: read
  issues: write                            # Required to create/update issues
  pull-requests: write                     # Required to comment on PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json || true
          echo "has_issues=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT

      - name: Run TypeScript type check
        id: tsc_check
        continue-on-error: true
        run: |
          npx tsc --noEmit > tsc-output.txt 2>&1 || true
          if grep -q "error" tsc-output.txt; then
            echo "has_error=true" >> $GITHUB_OUTPUT
          else
            echo "has_error=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Next.js build (static export test)
        id: next_build
        continue-on-error: true
        run: |
          NEXT_EXPORT=true pnpm run build > build-output.txt 2>&1 || true
          if grep -qi "error\|failed" build-output.txt; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update Parent Issue and Sub‑issues (PR Chain)
        uses: actions/github-script@v9
        env:
          HAS_VULNS: ${{ steps.npm_audit.outputs.has_issues }}
          HAS_TSC_ERRORS: ${{ steps.tsc_check.outputs.has_error }}
          HAS_BUILD_FAILURE: ${{ steps.next_build.outputs.build_failed }}
        with:
          script: |
            const fs = require('fs');
            const core = require('@actions/core');

            const prNumber = context.payload.pull_request?.number;
            const isSchedule = context.eventName === 'schedule';

            // Format all raw outputs for issue body
            const auditRaw = fs.existsSync('audit-results.json') ? 
              fs.readFileSync('audit-results.json', 'utf8') : '{}';
            const tscRaw = fs.existsSync('tsc-output.txt') ? 
              fs.readFileSync('tsc-output.txt', 'utf8') : '';
            const buildRaw = fs.existsSync('build-output.txt') ? 
              fs.readFileSync('build-output.txt', 'utf8') : '';

            const hasVulns = parseInt(process.env.HAS_VULNS) > 0;
            const hasTscErrors = process.env.HAS_TSC_ERRORS === 'true';
            const hasBuildFailure = process.env.HAS_BUILD_FAILURE === 'true';
            const hasProblems = hasVulns || hasTscErrors || hasBuildFailure;

            // ----- 1. Find or create Parent Issue for this PR -----
            let parentIssueNumber = null;
            const parentLabel = `pr-parent-${prNumber || 'main'}`;

            // Search for existing parent issue by label
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: parentLabel,
              state: 'open'
            });

            if (existingIssues.length > 0) {
              parentIssueNumber = existingIssues[0].number;
            } else if (prNumber && !isSchedule) {
              // Create parent issue for this PR
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📋 Audit Parent: PR #${prNumber}`,
                body: `This issue tracks audit results for PR #${prNumber}\n\n**Initial Audit Run:** ${new Date().toISOString()}`,
                labels: ['automated-audit', parentLabel]
              });
              parentIssueNumber = newIssue.number;

              // Post a comment on the PR linking to the parent issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `📋 Audit results are being tracked in parent issue #${parentIssueNumber}`
              });
            }

            // ----- 2. Build the parent issue body (aggregated summary) -----
            let parentBody = hasProblems ? 
              '# ⚠️ Audit Report: Issues Detected\n\n' : 
              '# ✅ Audit Report: All Checks Passed\n\n';

            parentBody += `**Last run:** ${new Date().toISOString()}\n\n`;

            if (hasProblems) {
              parentBody += '## Summary\n\n';
              if (hasVulns) parentBody += `- **npm audit:** Vulnerabilities found\n`;
              if (hasTscErrors) parentBody += `- **TypeScript:** Type errors detected\n`;
              if (hasBuildFailure) parentBody += `- **Next.js build:** Build failure\n\n`;
            } else {
              parentBody += 'All automated checks passed successfully.\n';
            }

            parentBody += '\n---\n\n## Detailed Results\n\n';

            if (hasVulns) {
              parentBody += `### npm Audit\n\n\`\`\`json\n${auditRaw.slice(0, 3000)}\n\`\`\`\n\n`;
            }
            if (hasTscErrors) {
              parentBody += `### TypeScript Errors\n\n\`\`\`\n${tscRaw.slice(0, 3000)}\n\`\`\`\n\n`;
            }
            if (hasBuildFailure) {
              parentBody += `### Build Failure\n\n\`\`\`\n${buildRaw.slice(0, 3000)}\n\`\`\`\n\n`;
            }

            // ----- 3. Manage sub-issues: create new ones, close resolved ones -----
            const subIssueLabels = ['audit-subissue'];
            const subIssuesToCreate = [];

            // Helper to find/create a sub-issue for a given category
            async function ensureSubIssue(title, bodyContent, status) {
              const { data: existingSubIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [...subIssueLabels, `sub-${title.replace(/[^a-z0-9]/gi, '-').toLowerCase()}`],
                state: 'open'
              });

              if (existingSubIssues.length > 0) {
                // Sub-issue already exists – update its body (optional) or leave as is
                if (!status) {
                  // If the problem is resolved, close the sub-issue
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existingSubIssues[0].number,
                    state: 'closed',
                    state_reason: 'completed'
                  });
                }
                return;
              }

              if (status) {
                const { data: newSubIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: `${bodyContent}\n\n**Parent issue:** #${parentIssueNumber}\n**Run time:** ${new Date().toISOString()}`,
                  labels: [...subIssueLabels, `sub-${title.replace(/[^a-z0-9]/gi, '-').toLowerCase()}`]
                });
                // Add a comment to the PR linking this sub-issue
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `🔍 Sub-issue created: #${newSubIssue.number} – ${title}`
                });
              }
            }

            // TypeScript errors – create one sub-issue per distinct error file/line
            if (hasTscErrors && tscRaw) {
              const errorPattern = /([^:\n]+\.tsx?):(\d+):(\d+) - error TS(\d+): (.*)/g;
              let match;
              const errorMap = new Map();
              while ((match = errorPattern.exec(tscRaw)) !== null) {
                const file = match[1];
                const line = match[2];
                const errorCode = match[4];
                const message = match[5];
                const key = `${file}:${line}`;
                if (!errorMap.has(key)) {
                  errorMap.set(key, { file, line, errorCode, message });
                }
              }
              for (const [, error] of errorMap) {
                await ensureSubIssue(
                  `TS Error: ${error.file}:${error.line}`,
                  `**Code:** TS${error.errorCode}\n**Message:** ${error.message}\n**File:** \`${error.file}\`\n**Line:** ${error.line}`,
                  true
                );
              }
            } else if (!hasTscErrors) {
              // No TS errors – close any open TS sub-issues
              const { data: tsSubIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [...subIssueLabels, 'sub-type-script-error'],
                state: 'open'
              });
              for (const issue of tsSubIssues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
            }

            // Build failure sub-issue
            if (hasBuildFailure) {
              await ensureSubIssue('Build Failure Detected', buildRaw.slice(0, 2000), true);
            } else {
              await ensureSubIssue('Build Failure Detected', '', false);
            }

            // npm audit sub-issues – create one per vulnerable package
            if (hasVulns && auditRaw !== '{}') {
              const auditData = JSON.parse(auditRaw);
              for (const [pkg, details] of Object.entries(auditData.vulnerabilities || {})) {
                await ensureSubIssue(
                  `Vulnerability: ${pkg}`,
                  `**Severity:** ${details.severity}\n**Title:** ${details.title}\n**URL:** ${details.url}`,
                  true
                );
              }
            } else if (!hasVulns) {
              // Close any open vulnerability sub-issues
              const { data: vulnSubIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [...subIssueLabels, 'sub-vulnerability'],
                state: 'open'
              });
              for (const issue of vulnSubIssues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
            }

            // ----- 4. Update the parent issue with the new body -----
            if (parentIssueNumber) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentIssueNumber,
                body: parentBody,
                state: hasProblems ? 'open' : 'closed'
              });
            }
